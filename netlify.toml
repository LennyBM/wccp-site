# Netlify deployment config for West Country Concrete Products

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  # Netlify auto-discovers functions/ — explicit directory + Node version pin.
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[plugins]]
  package = "netlify-plugin-submit-sitemap"
  [plugins.inputs]
    baseUrl = "https://westcountryconcreteproducts.co.uk"
    sitemapPath = "/sitemap-index.xml"
    providers = ["google", "bing", "indexnow"]

[build.environment]
  NODE_VERSION = "22.12.0"
  NPM_FLAGS = "--legacy-peer-deps"

# Force trailing-slash canonical: /index.html -> /
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

# Security headers (UK 2026 baseline) — applied to all paths
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-XSS-Protection = "0"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-site"
    # CSP allows: self + inline; CookieYes / Cookiebot CMP scripts + iframes;
    # Sentry ingest endpoints; Google Maps embed (used on /contact). Tweak this
    # list if a new vendor is added.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn-cookieyes.com https://consent.cookiebot.com https://*.sentry.io https://*.ingest.sentry.io https://plausible.io https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://cdn-cookieyes.com https://consent.cookiebot.com; img-src 'self' data: blob: https://www.google.com https://maps.googleapis.com https://maps.gstatic.com https://imgsct.cookiehub.net https://imgsct.cookiebot.com https://www.google-analytics.com; font-src 'self' data:; connect-src 'self' https://wa.me https://www.google.com https://*.cookieyes.com https://consent.cookiebot.com https://consentcdn.cookiebot.com https://*.sentry.io https://*.ingest.sentry.io https://plausible.io https://www.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com; frame-src https://www.google.com https://consent.cookiebot.com; form-action 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests"

# Astro static site — long cache on hashed assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pagefind index + UI — regenerated on every build, short cache only
[[headers]]
  for = "/pagefind/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Form handling
[forms]
  # Auto-detected by Netlify from any <form data-netlify="true">
