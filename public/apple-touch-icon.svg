<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="West Country Concrete Products">
  <!-- Brandmark: cobalt-blue rounded square (navy.700) -->
  <rect width="180" height="180" rx="22" fill="#3a5cb5"/>
  <!-- Hairline yellow inner border, mirrors the header brandmark -->
  <rect x="11" y="11" width="158" height="158" rx="16" fill="none" stroke="#fff005" stroke-opacity="0.35" stroke-width="2.5"/>
  <!-- Stacked wordmark — same as the header logo lockup -->
  <g font-family="'DM Sans', 'Inter Variable', 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif"
     font-weight="800"
     font-size="26"
     letter-spacing="1.1"
     fill="#fff005"
     text-anchor="middle">
    <text x="90" y="60">WEST</text>
    <text x="90" y="88">COUNTRY</text>
    <text x="90" y="124">CONCRETE</text>
    <text x="90" y="152">PRODUCTS</text>
  </g>
  <!-- Hairline rule between halves -->
  <line x1="40" y1="98" x2="140" y2="98" stroke="#fff005" stroke-opacity="0.45" stroke-width="1.5"/>
</svg>
