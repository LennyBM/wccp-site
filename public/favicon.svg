<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="WCCP">
  <!-- Heritage Navy seal -->
  <rect width="64" height="64" rx="6" fill="#0A2351"/>
  <!-- Thin white border around the wordmark -->
  <rect x="4" y="4" width="56" height="56" rx="4" fill="none" stroke="#F6F4EE" stroke-width="1.5" opacity="0.85"/>
  <!-- Yard Yellow stamped wordmark -->
  <text x="32" y="42"
        text-anchor="middle"
        font-family="'Work Sans', system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="700"
        font-size="22"
        letter-spacing="-0.5"
        fill="#F5C13B"
        stroke="#F6F4EE"
        stroke-width="0.6"
        paint-order="stroke fill">WCCP</text>
</svg>
